<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Segoe UI, sans-serif; padding: 20px; background: #1a1a2e; color: white; }
  p { font-size: 13px; color: #8884A8; margin-bottom: 10px; }
  input { width: 100%; padding: 10px 12px; font-size: 16px; border-radius: 8px; border: 2px solid #7C3AED; background: #0d0d12; color: white; text-transform: uppercase; outline: none; letter-spacing: 2px; }
  button { width: 100%; margin-top: 12px; padding: 10px; background: #7C3AED; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
  <p>Enter session code from host:</p>
  <input type="text" id="code" placeholder="AB12CD" maxlength="10" />
  <button id="btn">Join Session</button>
<script>
  const { ipcRenderer } = require('electron');
  function forceFocus() { document.getElementById('code').focus(); }
  forceFocus();
  setTimeout(forceFocus, 200);
  setTimeout(forceFocus, 500);
  setTimeout(forceFocus, 1000);
  document.getElementById('btn').onclick = submit;
  function submit() {
    ipcRenderer.send('dialog-submit', document.getElementById('code').value.trim().toUpperCase());
  }
  document.getElementById('code').onkeydown = (e) => { if(e.key==='Enter') submit(); };
  window.onfocus = forceFocus;
</script>
</body>
</html>
