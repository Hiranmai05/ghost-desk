<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GhostDesk</title>
<style>
  :root {
    --accent: #7C3AED;
    --bg: rgba(13, 13, 18, 0.93);
    --surface: rgba(255,255,255,0.05);
    --surface2: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.1);
    --text: #F0EFFF;
    --muted: #8884A8;
    --radius: 12px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font);
    background: transparent;
    color: var(--text);
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden; border-radius: 16px;
  }
  .window {
    display: flex; flex-direction: column; height: 100vh;
    background: var(--bg);
    border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; backdrop-filter: blur(24px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag; flex-shrink: 0;
  }
  .titlebar .dot { width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0; }
  .titlebar .title { font-size:12px;font-weight:600;color:var(--text);letter-spacing:.04em;flex:1; }
  .titlebar-btns { display:flex;gap:6px;-webkit-app-region:no-drag; }
  .titlebar-btns button {
    width:26px;height:26px;border:none;border-radius:6px;
    background:var(--surface2);color:var(--muted);cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;
  }
  .titlebar-btns button:hover { background:rgba(255,255,255,0.14);color:var(--text); }
  .desk-strip {
    display:flex;align-items:center;gap:6px;padding:6px 14px;
    background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);
    overflow-x:auto;flex-shrink:0;scrollbar-width:none;
  }
  .desk-strip::-webkit-scrollbar { display:none; }
  .desk-pill {
    display:flex;align-items:center;gap:5px;padding:3px 10px 3px 7px;
    border-radius:20px;border:1px solid transparent;
    font-size:11px;font-weight:500;color:var(--muted);white-space:nowrap;flex-shrink:0;
  }
  .desk-pill.current { border-color:var(--accent);color:var(--text);background:rgba(124,58,237,0.15); }
  .desk-pill .pill-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
  .desk-add {
    width:22px;height:22px;border-radius:50%;border:1px dashed var(--border);
    background:transparent;color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
    transition:border-color .15s,color .15s;
  }
  .desk-add:hover { border-color:var(--accent);color:var(--accent); }
  .opacity-bar {
    display:flex;align-items:center;gap:8px;padding:5px 14px;
    background:rgba(0,0,0,0.15);border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .opacity-bar label { font-size:10px;color:var(--muted);white-space:nowrap; }
  .opacity-bar input[type=range] { flex:1;height:3px;accent-color:var(--accent);cursor:pointer; }
  .opacity-bar span { font-size:10px;color:var(--muted);width:28px;text-align:right; }
  .tabs {
    display:flex;padding:0 14px;gap:0;border-bottom:1px solid var(--border);
    flex-shrink:0;background:rgba(0,0,0,0.1);
  }
  .tab {
    padding:9px 13px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;
    border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
    white-space:nowrap;display:flex;align-items:center;gap:5px;
  }
  .tab.active { color:var(--accent);border-bottom-color:var(--accent); }
  .tab:hover:not(.active) { color:var(--text); }
  .panels { flex:1;overflow:hidden;display:flex;flex-direction:column;-webkit-app-region:no-drag; }
  .panel { display:none;flex:1;flex-direction:column;overflow:hidden;padding:14px;gap:10px;-webkit-app-region:no-drag; }
  .panel.active { display:flex; }
  #notes-area {
    flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    color:var(--text);font-size:13px;padding:12px;resize:none;outline:none;
    font-family:var(--font);line-height:1.6;transition:border-color .15s;
  }
  #notes-area:focus { border-color:var(--accent); }
  #notes-area::placeholder { color:var(--muted); }
  .snippet-input-row { display:flex;gap:8px;flex-shrink:0; }
  .snippet-input-row input, .task-input-row input {
    flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:12px;padding:8px 10px;outline:none;
    font-family:var(--font);transition:border-color .15s;
  }
  .snippet-input-row input:focus, .task-input-row input:focus { border-color:var(--accent); }
  .snippet-input-row input::placeholder, .task-input-row input::placeholder { color:var(--muted); }
  .btn-add {
    background:var(--accent);border:none;border-radius:8px;color:#fff;
    font-size:18px;width:34px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0;
  }
  .btn-add:hover { opacity:.85; }
  .snippet-list { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px; }
  .snippet-item {
    display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;
  }
  .snippet-item span { flex:1;color:var(--text);word-break:break-word; }
  .snippet-item button { background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);transition:color .15s;flex-shrink:0; }
  .snippet-item button:hover { color:var(--text); }
  .copied-toast {
    display:none;background:rgba(124,58,237,0.25);border:1px solid var(--accent);
    border-radius:8px;color:var(--accent);font-size:11px;padding:6px 12px;text-align:center;flex-shrink:0;
  }
  .task-input-row { display:flex;gap:8px;flex-shrink:0; }
  .task-list { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px; }
  .task-item {
    display:flex;align-items:center;gap:8px;padding:8px 10px;
    background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;
  }
  .task-item input[type=checkbox] { accent-color:var(--accent);cursor:pointer;flex-shrink:0; }
  .task-item .task-text { flex:1;cursor:pointer; }
  .task-item.done .task-text { text-decoration:line-through;color:var(--muted); }
  .task-item button { background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);transition:color .15s;flex-shrink:0; }
  .task-item button:hover { color:#ef4444; }
  .ai-panel { display:flex;flex-direction:column;flex:1;overflow:hidden;gap:0; }
  .ai-key-row { display:flex;gap:6px;align-items:center;padding:0 0 10px 0;flex-shrink:0; }
  .ai-key-row input {
    flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:11px;padding:7px 10px;outline:none;
    font-family:'Courier New',monospace;transition:border-color .15s;
  }
  .ai-key-row input:focus { border-color:var(--accent); }
  .ai-key-row input::placeholder { color:var(--muted);font-family:var(--font); }
  .ai-key-save {
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-size:11px;padding:7px 10px;cursor:pointer;
    transition:background .15s;white-space:nowrap;
  }
  .ai-key-save:hover { background:rgba(255,255,255,0.12); }
  .ai-messages {
    flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  }
  .msg { display:flex;flex-direction:column;gap:3px; }
  .msg-label { font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.06em; }
  .msg-bubble {
    padding:9px 11px;border-radius:10px;font-size:12.5px;line-height:1.55;
    word-break:break-word;white-space:pre-wrap;
  }
  .msg.user .msg-label { text-align:right; }
  .msg.user .msg-bubble { background:rgba(124,58,237,0.25);border:1px solid rgba(124,58,237,0.4);color:var(--text);align-self:flex-end;max-width:90%; }
  .msg.ai .msg-bubble { background:var(--surface);border:1px solid var(--border);color:var(--text);align-self:flex-start;max-width:95%; }
  .msg.ai.streaming .msg-bubble::after { content:'▋';display:inline;animation:blink .8s infinite;color:var(--accent); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .ai-input-row {
    display:flex;gap:7px;align-items:flex-end;padding-top:10px;flex-shrink:0;
    border-top:1px solid var(--border);margin-top:8px;
  }
  .ai-input-row textarea {
    flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-size:12.5px;padding:9px 11px;outline:none;font-family:var(--font);
    resize:none;min-height:38px;max-height:100px;line-height:1.5;transition:border-color .15s;
  }
  .ai-input-row textarea:focus { border-color:var(--accent); }
  .ai-input-row textarea::placeholder { color:var(--muted); }
  .ai-send {
    background:var(--accent);border:none;border-radius:10px;color:#fff;
    width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:16px;transition:opacity .15s;flex-shrink:0;
  }
  .ai-send:hover { opacity:.85; }
  .ai-send:disabled { opacity:.4;cursor:not-allowed; }
  .ai-status { font-size:10px;color:var(--muted);text-align:center;padding:4px 0;min-height:18px;flex-shrink:0; }
  .ai-status.error { color:#ef4444; }
  .ai-clear {
    background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);padding:2px 6px;
    border-radius:5px;transition:color .15s,background .15s;flex-shrink:0;
  }
  .ai-clear:hover { color:var(--text);background:var(--surface2); }
  .desks-panel { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px; }
  .desk-card {
    display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12px;
  }
  .desk-card .dc-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
  .desk-card .dc-name { flex:1;font-weight:500; }
  .desk-card .dc-badge { font-size:10px;color:var(--muted); }
  .desk-card.current-card { border-color:var(--accent);background:rgba(124,58,237,0.1); }
  .btn-connect {
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:rgba(124,58,237,0.2);border:1px dashed rgba(124,58,237,0.5);border-radius:10px;
    color:var(--accent);font-size:12px;padding:12px;cursor:pointer;
    transition:background .15s,border-color .15s;font-family:var(--font);font-weight:500;
    -webkit-app-region:no-drag;
  }
  .btn-connect:hover { background:rgba(124,58,237,0.3);border-color:var(--accent); }

  /* ── REMOTE PANEL SPECIFIC ── */
  #panel-remote { -webkit-app-region: no-drag !important; }
  #panel-remote * { -webkit-app-region: no-drag !important; }
  #join-code-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.1);
    border: 2px solid var(--accent);
    border-radius: 10px;
    color: var(--text);
    outline: none;
    -webkit-app-region: no-drag;
    pointer-events: all;
    user-select: text;
    -webkit-user-select: text;
  }
  #join-code-input:focus { background: rgba(124,58,237,0.15); box-shadow: 0 0 0 3px rgba(124,58,237,0.3); }
  #join-code-input::placeholder { color: var(--muted); letter-spacing: 1px; font-size: 13px; }
  #join-connect-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-app-region: no-drag;
    pointer-events: all;
    transition: opacity .15s;
  }
  #join-connect-btn:hover { opacity: .85; }

  * { scrollbar-width:thin;scrollbar-color:var(--border) transparent; }
  *::-webkit-scrollbar { width:4px; }
  *::-webkit-scrollbar-track { background:transparent; }
  *::-webkit-scrollbar-thumb { background:var(--border);border-radius:4px; }
</style>
</head>
<body>
<div class="window" id="app">

  <div class="titlebar">
    <div class="dot" id="title-dot"></div>
    <span class="title" id="title-name">GhostDesk</span>
    <div class="titlebar-btns">
      <button onclick="window.ghostDesk.openNewDesk()" title="New Desk">＋</button>
      <button onclick="window.ghostDesk.minimize()" title="Minimize">─</button>
      <button onclick="window.ghostDesk.close()" title="Close">✕</button>
    </div>
  </div>

  <div class="desk-strip" id="desk-strip">
    <button class="desk-add" onclick="window.ghostDesk.openNewDesk()">＋</button>
  </div>

  <div class="opacity-bar">
    <label>Opacity</label>
    <input type="range" id="opacity-slider" min="30" max="100" value="93" oninput="setOpacity(this.value)"/>
    <span id="opacity-val">93%</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('ai')" id="tab-ai">🤖 AI</div>
    <div class="tab" onclick="switchTab('notes')" id="tab-notes">📝 Notes</div>
    <div class="tab" onclick="switchTab('snippets')" id="tab-snippets">⚡ Snippets</div>
    <div class="tab" onclick="switchTab('tasks')" id="tab-tasks">✅ Tasks</div>
    <div class="tab" onclick="switchTab('desks')" id="tab-desks">🖥 Desks</div>
    <div class="tab" onclick="switchTab('remote')" id="tab-remote">🌐 Remote</div>
  </div>

  <div class="panels">

    <!-- AI -->
    <div class="panel active" id="panel-ai">
      <div class="ai-panel">
        <div class="ai-key-row">
          <input type="password" id="api-key-input" placeholder="Paste your Anthropic API key (sk-ant-...)"/>
          <button class="ai-key-save" onclick="saveApiKey()">Save</button>
        </div>
        <div class="ai-messages" id="ai-messages">
          <div class="msg ai">
            <div class="msg-label">GHOST AI</div>
            <div class="msg-bubble">👋 Hi! I'm your private AI assistant. Add your Anthropic API key above to get started.</div>
          </div>
        </div>
        <div class="ai-status" id="ai-status"></div>
        <div class="ai-input-row">
          <textarea id="ai-input" placeholder="Ask anything..." rows="1" onkeydown="aiKeydown(event)" oninput="autoResize(this)"></textarea>
          <button class="ai-send" id="ai-send-btn" onclick="sendAiMessage()">↑</button>
        </div>
        <div style="display:flex;justify-content:flex-end;padding-top:4px;">
          <button class="ai-clear" onclick="clearChat()">Clear chat</button>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="panel" id="panel-notes">
      <textarea id="notes-area" placeholder="Your private scratchpad... Saves automatically." oninput="saveNotes()"></textarea>
    </div>

    <!-- Snippets -->
    <div class="panel" id="panel-snippets">
      <div class="snippet-input-row">
        <input id="snippet-input" placeholder="Add a snippet..." onkeydown="if(event.key==='Enter')addSnippet()"/>
        <button class="btn-add" onclick="addSnippet()">＋</button>
      </div>
      <div id="snippet-list" class="snippet-list"></div>
      <div class="copied-toast" id="copied-toast">✓ Copied!</div>
    </div>

    <!-- Tasks -->
    <div class="panel" id="panel-tasks">
      <div class="task-input-row">
        <input id="task-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()"/>
        <button class="btn-add" onclick="addTask()">＋</button>
      </div>
      <div id="task-list" class="task-list"></div>
    </div>

    <!-- Desks -->
    <div class="panel" id="panel-desks">
      <div class="desks-panel" id="desks-panel"></div>
      <button class="btn-connect" onclick="window.ghostDesk.openNewDesk()">＋ Connect New Desk</button>
    </div>

    <!-- Remote — ALL elements have no-drag via CSS -->
    <div class="panel" id="panel-remote">
      <div style="display:flex;flex-direction:column;gap:10px;">

        <button class="btn-connect" onclick="startHost()">🖥️ Host This Screen</button>

        <button class="btn-connect" id="btn-join-toggle" onclick="toggleJoinInput()">🔗 Join a Session</button>

        <!-- Join input — completely isolated from drag region -->
        <div id="join-input-row" style="display:none;flex-direction:column;gap:8px;">
          <input
            id="join-code-input"
            type="text"
            placeholder="Enter code  e.g. AB12CD"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="join-connect-btn" onclick="joinHost()">Connect →</button>
        </div>

        <div id="relay-status-box" style="display:none;font-size:12px;color:var(--muted);padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;word-break:break-all;"></div>

        <img id="remote-frame" style="display:none;width:100%;border-radius:8px;border:1px solid var(--border);"/>
        <button class="btn-connect" id="btn-fullscreen" style="display:none;" onclick="document.getElementById('remote-frame').requestFullscreen()">⛶ Full Screen</button>

        <button class="btn-connect" id="btn-stop-relay" style="display:none;border-color:#ef4444;color:#ef4444;" onclick="stopRelaySession()">✕ Disconnect</button>
      </div>
    </div>

  </div>
</div>

<script>
  window.onerror = function(msg, url, line) {
  const box = document.getElementById('relay-status-box');
  if (box) { box.style.display = 'block'; box.innerText = 'JS ERROR: ' + msg + ' (line ' + line + ')'; }
};
let myId = null, myColor = '#7C3AED', myName = 'GhostDesk';
let deskList = [], chatHistory = [], isStreaming = false;

(async () => {
  myId = await window.ghostDesk.getDeskId();
  const savedKey = await window.ghostDesk.storeGet('apiKey');
  if (savedKey) document.getElementById('api-key-input').value = savedKey;
  const notes = await window.ghostDesk.storeGet(`notes-${myId}`) || '';
  document.getElementById('notes-area').value = notes;
  renderSnippets(await window.ghostDesk.storeGet(`snippets-${myId}`) || []);
  renderTasks(await window.ghostDesk.storeGet(`tasks-${myId}`) || []);
})();

window.ghostDesk.onDeskIdentity(({ id, color, name }) => {
  myId = id; myColor = color; myName = name;
  document.getElementById('title-dot').style.background = color;
  document.getElementById('title-name').textContent = name;
  document.documentElement.style.setProperty('--accent', color);
});
window.ghostDesk.onDeskList((list) => { deskList = list; renderDeskStrip(); renderDesksPanel(); });

function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}
function setOpacity(val) {
  document.getElementById('opacity-val').textContent = val + '%';
  document.getElementById('app').style.background = `rgba(13,13,18,${val/100})`;
}
function renderDeskStrip() {
  const strip = document.getElementById('desk-strip');
  const addBtn = strip.querySelector('.desk-add');
  strip.querySelectorAll('.desk-pill').forEach(p => p.remove());
  deskList.forEach(d => {
    const pill = document.createElement('div');
    pill.className = 'desk-pill' + (d.id === myId ? ' current' : '');
    pill.innerHTML = `<span class="pill-dot" style="background:${d.color}"></span>${d.name}`;
    strip.insertBefore(pill, addBtn);
  });
}
function renderDesksPanel() {
  const panel = document.getElementById('desks-panel');
  panel.innerHTML = '';
  deskList.forEach(d => {
    const card = document.createElement('div');
    card.className = 'desk-card' + (d.id === myId ? ' current-card' : '');
    card.innerHTML = `<span class="dc-dot" style="background:${d.color}"></span><span class="dc-name">${d.name}</span><span class="dc-badge">${d.id === myId ? 'Current' : 'Connected'}</span>`;
    panel.appendChild(card);
  });
}
async function saveNotes() { await window.ghostDesk.storeSet(`notes-${myId}`, document.getElementById('notes-area').value); }
async function getSnippets() { return await window.ghostDesk.storeGet(`snippets-${myId}`) || []; }
async function saveSnippets(list) { await window.ghostDesk.storeSet(`snippets-${myId}`, list); }
function renderSnippets(list) {
  const el = document.getElementById('snippet-list'); el.innerHTML = '';
  list.forEach((s, i) => {
    const item = document.createElement('div'); item.className = 'snippet-item';
    item.innerHTML = `<span>${escHtml(s)}</span><button onclick="copySnippet(${i})">📋</button><button onclick="deleteSnippet(${i})">✕</button>`;
    el.appendChild(item);
  });
}
async function addSnippet() {
  const input = document.getElementById('snippet-input');
  const val = input.value.trim(); if (!val) return;
  const list = await getSnippets(); list.unshift(val);
  await saveSnippets(list); renderSnippets(list); input.value = '';
}
async function copySnippet(i) {
  const list = await getSnippets();
  await navigator.clipboard.writeText(list[i]);
  const t = document.getElementById('copied-toast'); t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1500);
}
async function deleteSnippet(i) {
  const list = await getSnippets(); list.splice(i, 1);
  await saveSnippets(list); renderSnippets(list);
}
async function getTasks() { return await window.ghostDesk.storeGet(`tasks-${myId}`) || []; }
async function saveTasks(list) { await window.ghostDesk.storeSet(`tasks-${myId}`, list); }
function renderTasks(list) {
  const el = document.getElementById('task-list'); el.innerHTML = '';
  list.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'task-item' + (t.done ? ' done' : '');
    item.innerHTML = `<input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})"/><span class="task-text" onclick="toggleTask(${i})">${escHtml(t.text)}</span><button onclick="deleteTask(${i})">✕</button>`;
    el.appendChild(item);
  });
}
async function addTask() {
  const input = document.getElementById('task-input');
  const val = input.value.trim(); if (!val) return;
  const list = await getTasks(); list.push({ text: val, done: false });
  await saveTasks(list); renderTasks(list); input.value = '';
}
async function toggleTask(i) {
  const list = await getTasks(); list[i].done = !list[i].done;
  await saveTasks(list); renderTasks(list);
}
async function deleteTask(i) {
  const list = await getTasks(); list.splice(i, 1);
  await saveTasks(list); renderTasks(list);
}
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim(); if (!key) return;
  window.ghostDesk.storeSet('apiKey', key);
  setStatus('✓ API key saved'); setTimeout(() => setStatus(''), 2000);
}
function setStatus(msg, isError = false) {
  const el = document.getElementById('ai-status');
  el.textContent = msg; el.className = 'ai-status' + (isError ? ' error' : '');
}
function aiKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAiMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function clearChat() {
  chatHistory = [];
  document.getElementById('ai-messages').innerHTML = `<div class="msg ai"><div class="msg-label">GHOST AI</div><div class="msg-bubble">Chat cleared!</div></div>`;
}
function appendMessage(role, content, streaming = false) {
  const messages = document.getElementById('ai-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}` + (streaming ? ' streaming' : '');
  div.innerHTML = `<div class="msg-label">${role === 'user' ? 'YOU' : 'GHOST AI'}</div><div class="msg-bubble"></div>`;
  div.querySelector('.msg-bubble').textContent = content;
  messages.appendChild(div); messages.scrollTop = messages.scrollHeight;
  return div;
}
async function sendAiMessage() {
  if (isStreaming) return;
  const input = document.getElementById('ai-input');
  const question = input.value.trim(); if (!question) return;
  const apiKey = document.getElementById('api-key-input').value.trim() || await window.ghostDesk.storeGet('apiKey');
  if (!apiKey) { setStatus('⚠ Add your Anthropic API key first', true); return; }
  input.value = ''; input.style.height = 'auto';
  isStreaming = true; document.getElementById('ai-send-btn').disabled = true;
  appendMessage('user', question); chatHistory.push({ role: 'user', content: question });
  const aiDiv = appendMessage('ai', '', true);
  const bubble = aiDiv.querySelector('.msg-bubble');
  let fullText = ''; setStatus('Thinking...');
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1024, stream: true,
        system: 'You are a private AI assistant inside GhostDesk. Be concise and helpful.',
        messages: chatHistory,
      }),
    });
    if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error(err?.error?.message || `HTTP ${response.status}`); }
    const reader = response.body.getReader(); const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      const lines = decoder.decode(value, { stream: true }).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim(); if (data === '[DONE]') continue;
        try { const j = JSON.parse(data); if (j.type === 'content_block_delta' && j.delta?.text) { fullText += j.delta.text; bubble.textContent = fullText; document.getElementById('ai-messages').scrollTop = 99999; } } catch(e) {}
      }
    }
    aiDiv.classList.remove('streaming'); chatHistory.push({ role: 'assistant', content: fullText }); setStatus('');
  } catch (err) {
    aiDiv.classList.remove('streaming'); bubble.textContent = '⚠ Error: ' + err.message;
    chatHistory.pop(); setStatus('Request failed — check your API key', true);
  }
  isStreaming = false; document.getElementById('ai-send-btn').disabled = false;
}

// ── Remote ──
function toggleJoinInput() {
  const row = document.getElementById('join-input-row');
  const show = row.style.display === 'none' || row.style.display === '';
  row.style.display = show ? 'flex' : 'none';
  if (show) {
    // Small delay then focus — works even with frameless windows
    setTimeout(() => {
      const inp = document.getElementById('join-code-input');
      inp.focus();
    }, 50);
  }
}
function startHost() {
  document.getElementById('relay-status-box').style.display = 'block';
  document.getElementById('relay-status-box').innerText = 'Starting host...';
  window.ghostDesk.relayStartHost();
}
function joinHost() {
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  if (!code) { document.getElementById('join-code-input').focus(); return; }
  document.getElementById('relay-status-box').style.display = 'block';
  document.getElementById('relay-status-box').innerText = 'Connecting to ' + code + '...';
  window.ghostDesk.relayJoin(code);
}
function stopRelaySession() {
  window.ghostDesk.relayStop();
  document.getElementById('relay-status-box').style.display = 'none';
  document.getElementById('remote-frame').style.display = 'none';
  document.getElementById('btn-stop-relay').style.display = 'none';
  document.getElementById('join-input-row').style.display = 'none';
}
window.ghostDesk.onRelayStatus((data) => {
  const box = document.getElementById('relay-status-box');
  box.style.display = 'block';
  document.getElementById('btn-stop-relay').style.display = 'block';
  if (data.status === 'hosting') box.innerText = '✅ Hosting — Share code: ' + data.code;
  else if (data.status === 'client-joined') box.innerText = '👁 Viewer connected (' + data.count + ')';
  else if (data.status === 'client-left') box.innerText = 'Viewer left (' + data.count + ' watching)';
  else if (data.status === 'connected') { box.innerText = '✅ Connected — receiving screen...'; document.getElementById('remote-frame').style.display = 'block'; }
  else if (data.status === 'host-disconnected') { box.innerText = 'Host disconnected'; document.getElementById('remote-frame').style.display = 'none'; }
  else if (data.status === 'disconnected') { box.innerText = 'Disconnected'; document.getElementById('remote-frame').style.display = 'none'; document.getElementById('btn-stop-relay').style.display = 'none'; }
  else if (data.status === 'error') box.innerText = '❌ Error: ' + (data.error || 'Could not connect');
});
window.ghostDesk.onHostCodeGenerated((code)=>{
  const box = document.getElementById('relay-status-box');
  box.style.display = 'block';
  box.innerText = 'Your code: ' + code;
});
window.ghostDesk.onRelayFrame((frame)=>{
  const img = document.getElementById('remote-frame');
  img.src='data:image/jpeg;base64,'+frame;
  img.style.display='block';
  document.getElementById('btn-fullscreen').style.display='block';
});

const frameImg = document.getElementById('remote-frame');
frameImg.addEventListener('mousemove', (e) => {
  const rect = frameImg.getBoundingClientRect();
  window.ghostDesk.relaySendControl({ type: 'mouse-move', x: (e.clientX - rect.left) / rect.width, y: (e.clientY - rect.top) / rect.height });
});
frameImg.addEventListener('click', (e) => { window.ghostDesk.relaySendControl({ type: 'mouse-click', button: 'left' }); });
frameImg.addEventListener('contextmenu', (e) => { e.preventDefault(); window.ghostDesk.relaySendControl({ type: 'mouse-click', button: 'right' }); });
frameImg.addEventListener('wheel', (e) => { window.ghostDesk.relaySendControl({ type: 'mouse-scroll', delta: e.deltaY }); });

// KEY FIX: Only send remote keys when frame is visible AND focus is NOT in an input
document.addEventListener('keydown', (e) => {
  const frameVisible = document.getElementById('remote-frame').style.display !== 'none';
  const activeTag = document.activeElement ? document.activeElement.tagName : '';
  const inInput = activeTag === 'INPUT' || activeTag === 'TEXTAREA';
  if (frameVisible && !inInput) {
    e.preventDefault();
    window.ghostDesk.relaySendControl({ type: 'key-press', key: e.key });
  }
});

function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
